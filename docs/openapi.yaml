openapi: 3.0.3
info:
  title: ESP32 Weather Station API
  description: |
    REST API домашней метеостанции на ESP32 (MicroPython).

    Подключённые датчики:
    - **DHT22** — температура и влажность (GPIO 14)
    - **BMP280** — температура и давление (I2C, GPIO 21/22)
    - **C8 / MH-Z19C** — CO₂ (UART, GPIO 16/17)

    Все ответы в формате JSON. Ошибки возвращаются как `{"error": "..."}`.
    Некоторые эндпоинты (например CO₂ при 503) возвращают расширенный объект с полем `diagnostics`.

    Базовый URL: `http://<IP_ESP32>` (порт по умолчанию 80).
  version: 2.0.0
  contact:
    name: ESP32 Weather Station

servers:
  - url: http://{host}
    description: ESP32 в локальной сети
    variables:
      host:
        default: 192.168.1.100
        description: IP-адрес устройства (см. GET /info)

tags:
  - name: System
    description: Здоровье системы и перезагрузка
  - name: Device
    description: Информация об устройстве
  - name: Sensors
    description: Агрегированные данные датчиков (заглушка)
  - name: DHT22
    description: Датчик температуры и влажности
  - name: BMP280
    description: Датчик давления
  - name: CO2
    description: Датчик углекислого газа (C8 или MH-Z19C)
  - name: GPIO
    description: Управление GPIO пинами
  - name: Settings
    description: Настройки в config.json на устройстве
  - name: Weather
    description: Внешняя погода через WeatherAPI

paths:
  /health:
    get:
      tags: [System]
      summary: Проверка работоспособности
      operationId: getHealth
      responses:
        '200':
          description: Сервер работает
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: OK
                uptime: 0
                memory_free: 125000

  /system/restart:
    post:
      tags: [System]
      summary: Перезагрузка ESP32
      description: Отправляет ответ и перезагружает устройство через ~1 с.
      operationId: restartSystem
      responses:
        '200':
          description: Перезагрузка запланирована
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: System restarting in 1 second...

  /discovery:
    get:
      tags: [Device]
      summary: Идентификация погодной станции
      description: |
        Лёгкий эндпоинт для обнаружения станции в локальной сети.
        Фронтенд или сканер подсети проверяет поле `device_type` и использует
        `station.id` как стабильный идентификатор (не IP).
      operationId: getDiscovery
      responses:
        '200':
          description: Станция идентифицирована
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryResponse'
              example:
                device_type: esp32_weather_station
                api_version: "2.0"
                station:
                  id: kitchen-01
                  name: Кухня
                  mac: "aa:bb:cc:dd:ee:ff"
                capabilities: [dht, bmp280, co2, weather]
                status: online
        '405':
          description: Метод не поддерживается
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /info:
    get:
      tags: [Device]
      summary: Информация об устройстве
      operationId: getInfo
      responses:
        '200':
          description: Сводка по чипу, памяти, сети
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceInfo'

  /info/deep:
    get:
      tags: [Device]
      summary: Расширенная системная информация
      operationId: getInfoDeep
      responses:
        '200':
          description: Wi-Fi, reset cause, unique ID, частота CPU
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /sensors:
    get:
      tags: [Sensors]
      summary: Агрегированные данные датчиков
      description: Заглушка — тестовые значения. Для реальных данных используйте /sensor/*.
      operationId: getSensors
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  sensors:
                    type: object
                    properties:
                      temperature: { type: number }
                      humidity: { type: number }
                      pressure: { type: number }
                      timestamp: { type: number }
    post:
      tags: [Sensors]
      summary: Обновить настройки опроса датчиков
      operationId: updateSensorsSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                read_interval: { type: integer, example: 5 }
                enabled: { type: boolean, example: true }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  result: { type: boolean }

  /sensor/dht:
    get:
      tags: [DHT22]
      summary: Показания DHT22
      operationId: getDhtReading
      parameters:
        - $ref: '#/components/parameters/force'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DhtReadingResponse'
        '500':
          $ref: '#/components/responses/Error'

  /sensor/dht/status:
    get:
      tags: [DHT22]
      summary: Статус DHT22
      operationId: getDhtStatus
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  initialized: { type: boolean }
                  pin: { type: integer, example: 14 }
                  last_temperature: { type: number, nullable: true }
                  last_humidity: { type: number, nullable: true }
                  last_read_time: { type: integer }

  /sensor/bmp280:
    get:
      tags: [BMP280]
      summary: Показания BMP280
      operationId: getBmp280Reading
      parameters:
        - $ref: '#/components/parameters/force'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bmp280ReadingResponse'
        '503':
          $ref: '#/components/responses/Error'

  /sensor/bmp280/status:
    get:
      tags: [BMP280]
      summary: Статус BMP280
      operationId: getBmp280Status
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /sensor/co2:
    get:
      tags: [CO2]
      summary: Концентрация CO₂
      description: |
        Поддерживаемые типы датчиков (config `CO2_SENSOR_TYPE`):
        - **c8** — активный режим (кадры 0x42 0x4D) или query
        - **mhz19c** — протокол Winsen MH-Z19
      operationId: getCo2Reading
      parameters:
        - $ref: '#/components/parameters/force'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Co2ReadingResponse'
        '503':
          description: Ошибка чтения + диагностика
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Co2ErrorResponse'

  /sensor/co2/status:
    get:
      tags: [CO2]
      summary: Статус CO₂ датчика
      operationId: getCo2Status
      parameters:
        - name: probe
          in: query
          schema:
            type: boolean
            default: false
          description: Выполнить UART-пробу и включить результат в ответ
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Co2StatusResponse'

  /sensor/co2/probe:
    get:
      tags: [CO2]
      summary: Диагностика UART линии CO₂
      operationId: probeCo2
      responses:
        '200':
          description: Протокол распознан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Co2ProbeResponse'
        '503':
          description: Протокол не распознан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Co2ProbeResponse'

  /sensor/co2/abc:
    post:
      tags: [CO2]
      summary: Включить/выключить ABC (только MH-Z19C)
      operationId: setCo2Abc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
                  example: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  abc_enabled: { type: boolean }
                  result: { type: string, example: success }
        '400':
          $ref: '#/components/responses/Error'

  /sensor/mhz19c:
    get:
      tags: [CO2]
      summary: '[Deprecated] Алиас /sensor/co2'
      deprecated: true
      operationId: getCo2ReadingAlias
      parameters:
        - $ref: '#/components/parameters/force'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Co2ReadingResponse'

  /sensor/mhz19c/status:
    get:
      tags: [CO2]
      summary: '[Deprecated] Алиас /sensor/co2/status'
      deprecated: true
      operationId: getCo2StatusAlias
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Co2StatusResponse'

  /sensor/mhz19c/probe:
    get:
      tags: [CO2]
      summary: '[Deprecated] Алиас /sensor/co2/probe'
      deprecated: true
      operationId: probeCo2Alias
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Co2ProbeResponse'

  /gpio:
    get:
      tags: [GPIO]
      summary: Состояние всех GPIO
      operationId: getAllGpio
      parameters:
        - name: mode
          in: query
          schema:
            type: string
            enum: [in, out]
          description: Фильтр по режиму пина
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  pins:
                    type: object
                    additionalProperties:
                      type: integer
                    example:
                      "14": 1
                      "16": 0
                  meta:
                    type: object
                    additionalProperties: true

  /gpio/batch:
    post:
      tags: [GPIO]
      summary: Установить несколько пинов
      operationId: setGpioBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pins]
              properties:
                pins:
                  type: object
                  additionalProperties:
                    type: integer
                    enum: [0, 1]
                  example:
                    "2": 1
                    "4": 0
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        success: { type: boolean }
                        error: { type: string }
                  meta:
                    type: object
                    properties:
                      total: { type: integer }

  /gpio/{pin}:
    parameters:
      - $ref: '#/components/parameters/gpioPin'
    get:
      tags: [GPIO]
      summary: Состояние одного пина
      operationId: getGpioPin
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  pin: { type: integer }
                  state: { type: integer, enum: [0, 1] }
                  mode: { type: string, example: IN }
                  meta:
                    type: object
                    properties:
                      writable: { type: boolean }
                      readable: { type: boolean }
        '404':
          $ref: '#/components/responses/Error'
    post:
      tags: [GPIO]
      summary: Установить состояние пина
      operationId: setGpioPin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state]
              properties:
                state:
                  type: integer
                  enum: [0, 1]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  pin: { type: integer }
                  state: { type: integer }
                  result: { type: string, example: success }

  /settings:
    get:
      tags: [Settings]
      summary: Получить настройки станции
      description: |
        Возвращает изменяемые параметры из `Config` / `config.json` и метаданные:
        какие ключи применяются сразу (`runtime_keys`), а какие требуют перезагрузки.
      operationId: getSettings
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
    post:
      tags: [Settings]
      summary: Обновить настройки станции
      description: |
        Частичное обновление плоских ключей `Config`. Runtime-параметры применяются сразу.
        Изменение `*_ENABLED`, `STATION_ID`, `SERVER_PORT` сохраняется в `config.json`,
        но вступает в силу после перезагрузки (`restart_required`).
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdate'
            example:
              SENSOR_POLL_INTERVAL_MS: 10000
              STATION_NAME: Дача
              BMP280_ENABLED: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsUpdateResult'
        '400':
          description: Неверные ключи или значения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsUpdateResult'
    delete:
      tags: [Settings]
      summary: Сбросить настройки к значениям по умолчанию
      description: Сбрасывает изменяемые ключи к дефолтам из `config.py` и сохраняет `config.json`.
      operationId: resetSettings
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsUpdateResult'

  /weather:
    get:
      tags: [Weather]
      summary: Текущая погода (WeatherAPI)
      operationId: getWeather
      parameters:
        - $ref: '#/components/parameters/force'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  weather:
                    type: object
                    additionalProperties: true
                  meta:
                    type: object
                    properties:
                      cached: { type: boolean }
                      timestamp: { type: number }
                      update_interval: { type: integer }
        '503':
          $ref: '#/components/responses/Error'

  /weather/refresh:
    post:
      tags: [Weather]
      summary: Принудительно обновить погоду
      operationId: refreshWeather
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  weather: { type: object }
                  timestamp: { type: number }
        '503':
          $ref: '#/components/responses/Error'

components:
  parameters:
    force:
      name: force
      in: query
      description: Принудительное чтение / обновление (игнорировать кэш)
      schema:
        type: boolean
        default: false
      example: true
    gpioPin:
      name: pin
      in: path
      required: true
      schema:
        type: integer
        example: 14

  responses:
    Error:
      description: Ошибка
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    HealthResponse:
      type: object
      properties:
        status: { type: string, example: OK }
        uptime: { type: integer }
        memory_free: { type: integer }

    DiscoveryResponse:
      type: object
      properties:
        device_type:
          type: string
          example: esp32_weather_station
          description: Признак, что устройство — погодная станция
        api_version:
          type: string
          example: "2.0"
        station:
          type: object
          properties:
            id:
              type: string
              example: kitchen-01
              description: Уникальный ID станции (config.py)
            name:
              type: string
              example: Кухня
              description: Человекочитаемое имя / местоположение
            mac:
              type: string
              nullable: true
              example: "aa:bb:cc:dd:ee:ff"
        capabilities:
          type: array
          items:
            type: string
            enum: [dht, bmp280, co2, weather]
        status:
          type: string
          enum: [online, offline]
      required: [device_type, api_version, station, capabilities, status]

    DeviceInfo:
      type: object
      properties:
        chip:
          type: object
          properties:
            platform: { type: string }
            micropython_version: { type: string }
            machine_model: { type: string }
            cpu_frequency_hz: { type: integer }
        memory: { type: object }
        filesystem: { type: object, nullable: true }
        network: { type: object }
        temperature: { type: number, nullable: true, description: Температура чипа ESP32 }

    DhtReadingResponse:
      type: object
      properties:
        sensor:
          type: object
          properties:
            temperature_celsius: { type: number }
            temperature_fahrenheit: { type: number }
            humidity_percent: { type: number }
            cached: { type: boolean }
        meta:
          type: object
          properties:
            sensor_type: { type: string, example: DHT22 }
            pin: { type: integer }
            timestamp: { type: integer }

    Bmp280ReadingResponse:
      type: object
      properties:
        sensor:
          type: object
          properties:
            temperature_celsius: { type: number }
            pressure_hpa: { type: number }
            pressure_pa: { type: number }
            pressure_mmhg: { type: number }
            cached: { type: boolean }
        meta:
          type: object
          properties:
            sensor_type: { type: string, example: BMP280 }
            i2c_id: { type: integer }
            address: { type: integer }
            timestamp: { type: integer }

    Co2ReadingResponse:
      type: object
      properties:
        sensor:
          type: object
          properties:
            co2_ppm: { type: integer, example: 412 }
            cached: { type: boolean }
            mode: { type: string, enum: [active, query], nullable: true }
        meta:
          type: object
          properties:
            sensor_type: { type: string, example: C8 }
            uart_id: { type: integer }
            tx_pin: { type: integer }
            rx_pin: { type: integer }
            timestamp: { type: integer }

    Co2ErrorResponse:
      type: object
      properties:
        error: { type: string }
        diagnostics: { type: object, additionalProperties: true }

    Co2StatusResponse:
      type: object
      properties:
        initialized: { type: boolean }
        sensor_type: { type: string, enum: [c8, mhz19c] }
        uart_id: { type: integer }
        tx_pin: { type: integer }
        rx_pin: { type: integer }
        baudrate: { type: integer }
        c8_mode: { type: string, enum: [active, query], nullable: true }
        last_co2_ppm: { type: integer, nullable: true }
        last_error: { type: string, nullable: true }
        diagnostics: { type: object }

    Co2ProbeResponse:
      type: object
      properties:
        ok: { type: boolean }
        sensor_type: { type: string }
        rx_analysis:
          type: object
          properties:
            detected_protocol: { type: string, nullable: true }
            has_c8_active_header: { type: boolean }
            has_mhz19_header: { type: boolean }
            summary: { type: string }
        last_rx_buffer:
          type: array
          items: { type: string }

    SettingsResponse:
      type: object
      properties:
        settings:
          $ref: '#/components/schemas/SettingsUpdate'
        meta:
          type: object
          properties:
            runtime_keys:
              type: array
              items: { type: string }
            restart_required_keys:
              type: array
              items: { type: string }

    SettingsUpdate:
      type: object
      additionalProperties: false
      properties:
        SENSOR_POLL_INTERVAL_MS: { type: integer, minimum: 2000, example: 5000 }
        SENSOR_POLL_ENABLED: { type: boolean, example: true }
        DISPLAY_EVENT_DURATION_MS: { type: integer, minimum: 500, example: 2000 }
        DISPLAY_IDLE_REFRESH_MS: { type: integer, minimum: 500, example: 3000 }
        STATION_NAME: { type: string, example: Метеостанция }
        WEATHER_CITY: { type: string, example: Moscow }
        WEATHER_UPDATE_INTERVAL: { type: integer, minimum: 60, example: 600 }
        DEBUG: { type: boolean, example: true }
        DHT_ENABLED: { type: boolean, example: true }
        BMP280_ENABLED: { type: boolean, example: true }
        CO2_ENABLED: { type: boolean, example: true }
        DISPLAY_ENABLED: { type: boolean, example: true }
        WEATHER_ENABLED: { type: boolean, example: true }
        STATION_ID: { type: string, example: station-01 }
        SERVER_PORT: { type: integer, minimum: 1, maximum: 65535, example: 80 }

    SettingsUpdateResult:
      type: object
      properties:
        ok: { type: boolean }
        applied:
          type: array
          items: { type: string }
          description: Ключи, применённые без перезагрузки
        restart_required:
          type: array
          items: { type: string }
          description: Ключи, сохранённые в config.json, требуют reboot
        settings:
          $ref: '#/components/schemas/SettingsUpdate'
        meta:
          type: object
          properties:
            runtime_keys:
              type: array
              items: { type: string }
            restart_required_keys:
              type: array
              items: { type: string }
        errors:
          type: object
          additionalProperties:
            type: string

    Settings:
      deprecated: true
      description: Устаревшая вложенная схема. Используйте SettingsUpdate.
      type: object
      properties:
        wifi:
          type: object
          properties:
            ssid: { type: string }
            password: { type: string }
        server:
          type: object
          properties:
            port: { type: integer }
            debug: { type: boolean }
        sensors:
          type: object
          properties:
            read_interval: { type: integer }
            enabled: { type: boolean }
